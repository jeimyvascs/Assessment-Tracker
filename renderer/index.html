<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Assessement Tracker</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body class="bg-gray-50">
    <div
      class="flex items-center justify-between gap-4 p-4 border-b border-gray-300"
    >
      <h1 class="text-2xl font-bold">Tracker</h1>
      <button
        id="newBtn"
        data-filter="all"
        class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded font-semibold whitespace-nowrap"
      >
        + New
      </button>
    </div>

    <div class="flex gap-2 px-4 py-2 border-b border-gray-200" id="filterTabs">
      <button
        data-filter="all"
        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-semibold text-sm"
      >
        All
      </button>
      <button
        data-filter="assessement"
        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-semibold text-sm"
      >
        Assessements
      </button>

      <button
        data-filter="assignment"
        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-semibold text-sm"
      >
        Assignments
      </button>
    </div>
    <div
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center"
      id="formModal"
    >
      <div class="bg-white rounded shadow-lg p-6 w-96">
        <button class="close float-right text-xl font-bold cursor-pointer">
          x
        </button>

        <div class="mb-4">
          <label for="name" class="block text-sm font-semibold mb-2"
            >Name:</label
          >
          <input
            type="name"
            id="name"
            class="w-full px-3 py-2 border border-gray-300 rounded"
            required
            placeholder="e.g. Midterm exam"
          />
        </div>
        <div class="mb-4">
          <label for="type" class="block text-sm font-semibold mb-2"
            >Type:</label
          >
          <select
            id="type"
            name="type"
            class="w-full px-3 py-2 border border-gray-300 rounded"
            required
          >
            <option value="assignment">Assignment</option>
            <option value="assessement">Assessement</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="class" class="block text-sm font-semibold mb-2"
            >Class</label
          >
          <select
            id="class"
            name="class"
            class="w-full px-3 py-2 border border-gray-300 rounded"
            required
          >
            <option value="Object Oriented Programming">
              Object Oriented Programming
            </option>
            <option value="Systems Programming">Systems Programming</option>
            <option value="GUI Programming">GUI Programming</option>
            <option value="Sociology">Sociology</option>
            <option value="Belizean History">Belizean History</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="dueDate" class="block text-sm font-semibold mb-2"
            >Due date:</label
          >
          <input
            type="date"
            id="date"
            class="w-full px-3 py-2 border border-gray-300 rounded"
            required
          />
        </div>

        <div class="mb-4">
          <label for="time" class="block text-sm font-semibold mb-2"
            >Time:</label
          >
          <input
            type="time"
            id="time"
            class="w-full px-3 py-2 border border-gray-300 rounded"
          />
        </div>

        <div class="mb-4">
          <label for="desc" class="block text-sm font-semibold mb-2"
            >Description</label
          >
          <input
            id="desc"
            type="text"
            class="w-full px-3 py-2 border border-gray-300 rounded"
            required
            placeholder="Optional notes..."
          />
        </div>

        <div class="mb-4">
          <button
            id="submitBtn"
            type="submit"
            class="float-left px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded font-semibold"
          >
            Add
          </button>
        </div>
      </div>
    </div>

    <div class="p-4">
      <div id="display"></div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
